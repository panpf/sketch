name: Package

on: workflow_dispatch

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: zulu

jobs:
  package-android:
    name: Package android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true
      - uses: android-actions/setup-android@v4

      - name: Run package
        run: internal/package_android.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-files
          path: samples/androidApp/build/outputs/apk/release/*.apk

  package-ios:
    name: Package iOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_ios.sh

      - name: Read version name
        id: version_name_step
        run: |
          versionName=$(grep '^versionName=' gradle.properties | awk -F'=' '{print $2}')
          echo "version_name=$versionName" >> $GITHUB_OUTPUT

      - name: Compress
        run: |
          cd samples/shared/build/ios/outputs/Build/Products/Debug-iphonesimulator
          zip -r "sketch-sample-${{ steps.version_name_step.outputs.version_name }}.app.zip" "Sketch4.app"
          cd -

      - name: Upload ios artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ios-files
          path: samples/shared/build/ios/outputs/Build/Products/Debug-iphonesimulator/*.app.zip

  package-linux:
    name: Package linux desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_desktop.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-files
          path: samples/desktopApp/build/compose/binaries/main-release/deb/*.deb

  package-macos:
    name: Package macOS desktop
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_desktop.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-files
          path: samples/desktopApp/build/compose/binaries/main-release/dmg/*.dmg

  package-windows:
    name: Package windows desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_desktop.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-files
          path: samples/desktopApp/build/compose/binaries/main-release/msi/*.msi

  package-js:
    name: Package js browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_js.sh

      - name: Read version name
        id: version_name_step
        run: |
          versionName=$(grep '^versionName=' gradle.properties | awk -F'=' '{print $2}')
          echo "version_name=$versionName" >> $GITHUB_OUTPUT

      - name: Compress
        run: |
          cd samples/jsApp/build/dist/js/productionExecutable
          zip -r "sketch-sample-js-${{ steps.version_name_step.outputs.version_name }}.zip" *
          cd -

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: js-browser-files
          path: samples/jsApp/build/dist/js/productionExecutable/*.zip

  package-wasm-js:
    name: Package wasmJs browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_wasmJs.sh

      - name: Read version name
        id: version_name_step
        run: |
          versionName=$(grep '^versionName=' gradle.properties | awk -F'=' '{print $2}')
          echo "version_name=$versionName" >> $GITHUB_OUTPUT

      - name: Compress
        run: |
          cd samples/wasmJsApp/build/dist/wasmJs/productionExecutable
          zip -r "sketch-sample-wasmJs-${{ steps.version_name_step.outputs.version_name }}.zip" *
          cd -

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-js-browser-files
          path: samples/wasmJsApp/build/dist/wasmJs/productionExecutable/*.zip