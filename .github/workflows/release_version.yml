name: Release Version

on:
  push:
    tags:
      - '*'

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: zulu

jobs:
  check-abi:
    name: Check Abi
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Check binary compatibility
        run: ./gradlew checkKotlinAbi || { exit_code=$?; printf "*** Sketch's public API has changed. If this change is intentional, run './gradlew updateKotlinAbi' and commit the new API files. ***"; exit $exit_code; }

  test-android-23:
    name: Android Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [ 23 ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      # API 30+ emulators only have x86_64 system images.
      - name: Get AVD info
        uses: ./.github/actions/get-avd-info
        id: avd-info
        with:
          api-level: ${{ matrix.api-level }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ steps.avd-info.outputs.arch }}
          target: ${{ steps.avd-info.outputs.target }}
          profile: pixel # from command 'avdmanager list device'
          ram-size: 2048M
          heap-size: 512M
          #          disable-animations: true
          script: |
            mv .github/debug.keystore ~/.android
            internal/test_android_23.sh

  test-android-24p:
    name: Android Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        #        api-level: [ 26, 30, 34, 37 ]
        api-level: [ 26, 30, 34 ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      # API 30+ emulators only have x86_64 system images.
      - name: Get AVD info
        uses: ./.github/actions/get-avd-info
        id: avd-info
        with:
          api-level: ${{ matrix.api-level }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ steps.avd-info.outputs.arch }}
          target: ${{ steps.avd-info.outputs.target }}
          profile: pixel # from command 'avdmanager list device'
          ram-size: 2048M
          heap-size: 512M
          #          disable-animations: true
          script: |
            mv .github/debug.keystore ~/.android
            internal/test_android.sh

  test-ios:
    name: iOS Unit tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run ios test
        run: internal/test_ios.sh

  test-desktop:
    name: Desktop Unit tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run desktop test
        run: internal/test_desktop.sh

  package-android:
    name: Package android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true
      - uses: android-actions/setup-android@v4

      - name: Run package
        run: internal/package_android.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-files
          path: samples/androidApp/build/outputs/apk/release/*.apk

  package-ios:
    name: Package iOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_ios.sh

      - name: Read version name
        id: version_name_step
        run: |
          versionName=$(grep '^versionName=' gradle.properties | awk -F'=' '{print $2}')
          echo "version_name=$versionName" >> $GITHUB_OUTPUT

      - name: Compress
        run: |
          cd samples/shared/build/ios/outputs/Build/Products/Debug-iphonesimulator
          zip -r "sketch-sample-${{ steps.version_name_step.outputs.version_name }}.app.zip" "Sketch4.app"
          cd -

      - name: Upload ios artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ios-files
          path: samples/shared/build/ios/outputs/Build/Products/Debug-iphonesimulator/*.app.zip

  package-linux:
    name: Package linux desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_desktop.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-files
          path: samples/desktopApp/build/compose/binaries/main-release/deb/*.deb

  package-macos:
    name: Package macOS desktop
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_desktop.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-files
          path: samples/desktopApp/build/compose/binaries/main-release/dmg/*.dmg

  package-windows:
    name: Package windows desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_desktop.sh

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-files
          path: samples/desktopApp/build/compose/binaries/main-release/msi/*.msi

  package-js:
    name: Package js browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_js.sh

      - name: Read version name
        id: version_name_step
        run: |
          versionName=$(grep '^versionName=' gradle.properties | awk -F'=' '{print $2}')
          echo "version_name=$versionName" >> $GITHUB_OUTPUT

      - name: Compress
        run: |
          cd samples/jsApp/build/dist/js/productionExecutable
          zip -r "sketch-sample-js-${{ steps.version_name_step.outputs.version_name }}.zip" *
          cd -

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: js-browser-files
          path: samples/jsApp/build/dist/js/productionExecutable/*.zip

  package-wasm-js:
    name: Package wasmJs browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Run package
        run: internal/package_wasmJs.sh

      - name: Read version name
        id: version_name_step
        run: |
          versionName=$(grep '^versionName=' gradle.properties | awk -F'=' '{print $2}')
          echo "version_name=$versionName" >> $GITHUB_OUTPUT

      - name: Compress
        run: |
          cd samples/wasmJsApp/build/dist/wasmJs/productionExecutable
          zip -r "sketch-sample-wasmJs-${{ steps.version_name_step.outputs.version_name }}.zip" *
          cd -

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-js-browser-files
          path: samples/wasmJsApp/build/dist/wasmJs/productionExecutable/*.zip

  deploy-api-docs:
    name: Deploy API docs
    needs: [ check-abi, test-android-23, test-android-24p, test-ios, test-desktop, package-android, package-ios, package-linux, package-macos, package-windows, package-js, package-wasm-js ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true

      - name: Build the api docs
        run: ./gradlew dokkaGenerate

      - name: Check out the gh-pages branch
        run: |
          git fetch origin gh-pages:gh-pages
          git checkout gh-pages

      - name: Remove old api directory
        run: rm -rf api/*

      - name: Create api directory
        run: mkdir -p api

      - name: Move build artifacts to api directory
        run: mv build/dokka/html/* api/

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: "Update api docs"
          branch: gh-pages
          file_pattern: api/*

  publish:
    name: Publish and release to maven central
    needs: deploy-api-docs
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
        continue-on-error: true
        timeout-minutes: 5
        with:
          cache-overwrite-existing: true
      - uses: android-actions/setup-android@v4

      - name: Run publish
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
  #        run: ./gradlew publishToMavenCentral --no-configuration-cache

  release:
    name: Release new version
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v8
        with:
          name: android-files
          path: ./downloaded

      - name: Download ios artifacts
        uses: actions/download-artifact@v8
        with:
          name: ios-files
          path: ./downloaded

      - name: Download deb artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-files
          path: ./downloaded

      - name: Download dmg artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-files
          path: ./downloaded

      - name: Download msi artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-files
          path: ./downloaded

      - name: Download js-browser artifacts
        uses: actions/download-artifact@v8
        with:
          name: js-browser-files
          path: ./downloaded

      - name: Download wasm-js-browser artifacts
        uses: actions/download-artifact@v8
        with:
          name: wasm-js-browser-files
          path: ./downloaded

      - name: Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: startsWith(github.ref, 'refs/tags/') # Only run on tag push
        with:
          body: |
            Please check the [CHANGELOG.md](https://github.com/panpf/sketch/blob/main/CHANGELOG.md) file for updated log.
            
            Android, iOS, desktop and web packages, see the Assets attachment.
            
            Web example：https://panpf.github.io/sketch/app.
          files: ./downloaded/*
          make_latest: true